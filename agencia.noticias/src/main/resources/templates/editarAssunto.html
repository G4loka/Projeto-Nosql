<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Editar Assunto | Agência de Notícias Web</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center">

  <div class="bg-white shadow-lg rounded-xl p-8 w-full max-w-md">
    <h1 class="text-2xl font-bold text-center text-blue-900 mb-6">Editar Assunto</h1>

    <form method="POST" th:action="@{editarAssunto(idAssunto=${assunto.id})}" class="space-y-4">
      
      <!-- Nome -->
      <div>
        <label class="block text-sm font-medium text-gray-700">Nome do assunto:</label>
        <input type="text" name="nome" th:value="${assunto.nome}" 
               class="mt-1 block w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-blue-500 focus:border-blue-500"/>
      </div>

      <!-- Tipo -->
      <div>
        <label class="block text-sm font-medium text-gray-700">Tipo do assunto:</label>
        <input type="text" name="tipo" th:value="${assunto.tipo}" 
               class="mt-1 block w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-blue-500 focus:border-blue-500"/>
      </div>

      <!-- Descrição -->
      <div>
        <label class="block text-sm font-medium text-gray-700">Descrição:</label>
        <textarea name="descricao" rows="3" th:text="${assunto.descricao}"
                  class="mt-1 block w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
      </div>

      <!-- Botão -->
      <div class="text-center">
        <input type="submit" value="Salvar alterações" 
               class="bg-blue-900 text-white px-5 py-2 rounded-lg hover:bg-blue-800 transition"/>
      </div>
    </form>
  </div>

</body>
</html>
