<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastrar Assunto | Agência de Notícias Web</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

  <!-- HEADER -->
  <div th:replace="~{cabecalho :: meuCabecalho}"></div>

  <!-- CONTEÚDO PRINCIPAL -->
  <main class="flex-grow flex flex-col items-center justify-center px-4">
    <div class="bg-white shadow-lg rounded-2xl p-8 w-full max-w-lg">
      <h2 class="text-2xl font-semibold text-blue-900 text-center mb-6">
        Cadastro de Assunto
      </h2>

      <form method="POST" action="cadastrarAssunto" class="space-y-4">
        <!-- Nome -->
        <div>
          <label for="nome" class="block text-gray-700 font-medium mb-1">
            Nome do Assunto
          </label>
          <input type="text" id="nome" name="nome"
                 class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
                 placeholder="Ex: Política, Esportes, Tecnologia..." required>
        </div>

        <!-- Tipo -->
        <div>
          <label for="tipo" class="block text-gray-700 font-medium mb-1">
            Tipo do Assunto
          </label>
          <input type="text" id="tipo" name="tipo"
                 class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
                 placeholder="Ex: Nacional, Internacional, Entretenimento..." required>
        </div>

        <!-- Descrição -->
        <div>
          <label for="descricao" class="block text-gray-700 font-medium mb-1">
            Descrição
          </label>
          <textarea id="descricao" name="descricao" rows="4"
                    class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
                    placeholder="Descreva brevemente o assunto..." required></textarea>
        </div>

        <!-- Botões -->
        
        <!-- voltar -->
        <a th:replace="~{botoes :: botaoVoltar('/', '← Voltar')}"></a>
          
        <!-- cadastro -->
          
          <button type="submit"
                  class="bg-blue-900 text-white px-6 py-2 rounded-xl shadow-md hover:bg-blue-800 transition">
            Cadastrar
          </button>
        </div>
      </form>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="bg-gray-200 text-gray-700 text-center py-4 text-sm">
    © 2025 Agência de Notícias Web. Todos os direitos reservados.
  </footer>

</body>
</html>
